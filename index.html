<script>    
    //con la etiqueta script podemos escribir código JavaScript dentro de nuestro documento HTML. Esto nos permite agregar interactividad y funcionalidad a nuestra página web. Por ejemplo, podemos usar JavaScript para responder a eventos del usuario, manipular el contenido de la página, o realizar cálculos. En este caso, el código JavaScript se ejecutará cuando se cargue la página, pero también podríamos agregar eventos para que se ejecute en respuesta a acciones específicas del usuario, como hacer clic en un botón o enviar un formulario.
/**
*Calcular descuentos
*2 variables: precio y descuento 
* declarar las variables
*/
let precioOriginal=25.50; //double
let descuento=15;
let resultado=precioOriginal-(precioOriginal*descuento/100);
console.log("El precio a pagar $"+resultado);
// otra forma usan comillas invertidas ``
console.log(`El precio a pagar es $${resultado}`);
</script>
